{% extends "base.html" %} {% block title %}Movies - Shivam Booking{% endblock %} {%
block content %}
<div class="movies-page">
  <div class="container">
    <h1>All Movies</h1>
    <div class="movies-grid">
      {% for movie in movies %}
      <div class="movie-card">
        <div class="movie-poster">
          <img
            src="{{ movie[7] or '/static/images/placeholder.jpg' }}"
            alt="{{ movie[1] }}"
          />
        </div>
        <div class="movie-info">
          <h3>{{ movie[1] }}</h3>
          <p class="description">{{ movie[2][:100] }}...</p>
          <p class="genre">{{ movie[3] }}</p>
          <p class="rating">★ {{ movie[4] }}/10</p>
          <p class="duration">⏱ {{ movie[5] }} mins</p>
          <p class="language">🎤 {{ movie[6] }}</p>
          <a href="/movie/{{ movie[0] }}" class="book-btn">View & Book</a>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
